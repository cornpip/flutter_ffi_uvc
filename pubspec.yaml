name: flutter_ffi_uvc
description: Flutter FFI plugin for Android UVC cameras built on vendored libuvc.
version: 0.0.2
repository: https://github.com/cornpip/flutter_ffi_uvc

environment:
  sdk: ^3.11.1
  flutter: '>=3.3.0'

topics:
  - camera
  - usb
  - uvc
  - ffi

dependencies:
  flutter:
    sdk: flutter
  ffi: ^2.1.3

dev_dependencies:
  ffigen: ^20.1.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        ffiPlugin: true
